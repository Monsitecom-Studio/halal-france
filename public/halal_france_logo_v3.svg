<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg"><defs><mask id="imagine-text-gaps-m5kkxa" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="420" fill="white"/><rect x="231.17626953125" y="275.025634765625" width="217.64743041992188" height="52.20512390136719" fill="black" rx="2"/><rect x="281.1682434082031" y="338.6666259765625" width="117.6634521484375" height="20.410255432128906" fill="black" rx="2"/><rect x="244.83811950683594" y="376.7179260253906" width="190.32369995117188" height="17.333332061767578" fill="black" rx="2"/></mask></defs>
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Halal France</title>
